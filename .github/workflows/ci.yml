# CI for LABY — runs on every push and pull request.
# - Always: JS syntax check (node --check game.js).
# - On the wasm branch (where wasm/Cargo.toml exists): Rust unit tests too.
# Free for public repos. Does not affect GitHub Pages (Pages serves `main`
# independently of Actions status).
name: CI

on:
  push:
    branches: ['**']   # any branch
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax (game.js)
        run: node --check game.js

      # Only when the Rust crate is present (experiment/wasm-maze branch).
      # On main there is no wasm/ folder, so this step is skipped.
      - name: Set up Rust (wasm branch only)
        if: hashFiles('wasm/Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust unit tests (wasm branch only)
        if: hashFiles('wasm/Cargo.toml') != ''
        working-directory: wasm
        run: cargo test
